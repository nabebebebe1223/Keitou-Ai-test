<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>ケイトウ判定AI</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <style>
        body { text-align: center; font-family: sans-serif; background: #f4f4f9; margin: 0; padding: 20px; }
        #video-container { position: relative; display: inline-block; width: 100%; max-width: 400px; }
        video { width: 100%; border-radius: 15px; background: #000; }
        #result-box { margin-top: 20px; padding: 20px; background: white; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        #label { font-size: 28px; font-weight: bold; color: #e91e63; }
        #conf { font-size: 18px; color: #666; }
    </style>
</head>
<body>
    <h2>ケイトウ選別カメラ</h2>
    <div id="video-container">
        <video id="webcam" autoplay playsinline muted></video>
    </div>
    <div id="result-box">
        <div id="label">AI起動中...</div>
        <div id="conf">カメラを許可してください</div>
    </div>

    <script>
        let model;
        // signature.jsonにあるラベルの順番をここに書く
        const labels = ["不良", "可", "良"]; 

        const video = document.getElementById('webcam');
        const labelDiv = document.getElementById('label');
        const confDiv = document.getElementById('conf');

        async function setupWebcam() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: 'environment' }, // 外カメラ優先
                    audio: false 
                });
                video.srcObject = stream;
                return new Promise(resolve => video.onloadedmetadata = resolve);
            } catch (e) {
                labelDiv.innerText = "エラー";
                confDiv.innerText = "カメラの起動に失敗しました。HTTPSで接続しているか確認してください。";
            }
        }

        async function init() {
            try {
                // model.jsonを読み込む
                model = await tf.loadGraphModel('./model.json');
                await setupWebcam();
                labelDiv.innerText = "準備完了";
                predict();
            } catch (e) {
                labelDiv.innerText = "読み込みエラー";
                console.error(e);
            }
        }

        async function predict() {
            const img = tf.browser.fromPixels(video);
            const resized = tf.image.resizeBilinear(img, [224, 224]);
            const batched = resized.expandDims(0).toFloat().div(127.5).sub(1);
            
            const prediction = await model.predict(batched);
            const scores = await prediction.data();
            
            const maxScore = Math.max(...scores);
            const index = scores.indexOf(maxScore);
            
            // 判定結果を表示
            labelDiv.innerText = labels[index];
            confDiv.innerText = "確信度: " + Math.round(maxScore * 100) + "%";

            requestAnimationFrame(predict);
        }
        init();
    </script>
</body>
</html>
